<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bot Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: #0f0f1a;
    color: #e8edf5;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    background: #161625;
    border-bottom: 1px solid #1e2b45;
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .topbar h1 {
    font-size: 16px;
    font-weight: 700;
    margin-right: 16px;
    white-space: nowrap;
  }

  .nav-buttons {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .nav-btn {
    padding: 8px 18px;
    border: 1px solid #2a3a5c;
    border-radius: 8px;
    background: #1a1a2e;
    color: #9ca3af;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    white-space: nowrap;
  }

  .nav-btn:hover {
    background: #222240;
    color: #e8edf5;
    border-color: #3a4a6c;
  }

  .nav-btn.active {
    background: linear-gradient(135deg, #1E88E5, #6366F1);
    color: #fff;
    border-color: transparent;
    box-shadow: 0 2px 12px rgba(30, 136, 229, 0.3);
  }

  .content {
    flex: 1;
    position: relative;
  }

  .content iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  .placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    color: #5a6a84;
  }

  .placeholder svg {
    width: 64px;
    height: 64px;
    opacity: 0.4;
  }

  .placeholder p {
    font-size: 15px;
  }
</style>
</head>
<body>

<div class="topbar">
  <h1>Bot Dashboard</h1>
  <div class="nav-buttons">
    <button class="nav-btn" onclick="loadPage('AIDM-M01-S01-BOT01.html', this)">Campaign Bot - Strategic Thinking</button>
    <button class="nav-btn" onclick="loadPage('AIDA-M01-S02-BOT01.html', this)">Data Bot - Data Literacy</button>
    <button class="nav-btn" onclick="loadPage('AICS-M01-S01-BOT01.html', this)">Practice Bot - Logic & Decomposition</button>
    <button class="nav-btn" onclick="loadPage('AICS-M01-S02-BOT01.html', this)">Practice Bot - Algorithms & Pseudocode</button>
  </div>
</div>

<div class="content" id="content">
  <div class="placeholder" id="placeholder">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
        d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
    </svg>
    <p>Select a bot above to get started</p>
  </div>
</div>

<script>
  function loadPage(file, btn) {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const container = document.getElementById('content');
    const placeholder = document.getElementById('placeholder');
    if (placeholder) placeholder.remove();

    let iframe = container.querySelector('iframe');
    if (!iframe) {
      iframe = document.createElement('iframe');
      container.appendChild(iframe);
    }
    iframe.src = file;
  }
</script>

</body>
</html>
