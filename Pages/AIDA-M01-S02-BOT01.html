<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Bot - Data Literacy | AIDA-M01-S02-BOT01</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --pri:#26C6DA;--pri-dark:#00ACC1;--pri-glow:rgba(38,198,218,.15);
  --accent:#B388FF;--accent-dark:#7C4DFF;--accent-glow:rgba(179,136,255,.12);
  --success:#69F0AE;--success-dim:#00E676;--success-bg:rgba(105,240,174,.08);
  --warn:#FFD740;--warn-dim:#FFAB00;--warn-bg:rgba(255,215,64,.08);
  --err:#FF5252;--err-bg:rgba(255,82,82,.08);
  --bg:#0B1120;--surface:#131B2E;--surface2:#1A2540;--surface3:#223058;
  --bot-bub:#151D32;--user-bub:#0D3D5F;
  --text:#E8EDF5;--text2:#8B99B0;--text3:#5A6A84;
  --border:#1E2B45;--border2:#2A3A5C;
  --radius:12px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
::selection{background:var(--pri);color:var(--bg)}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

.app{display:flex;height:100vh}

/* Header */
.chat-panel{flex:1;display:flex;flex-direction:column;min-width:0}
.hdr{padding:14px 20px;background:linear-gradient(135deg,var(--surface) 0%,var(--surface2) 100%);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;flex-shrink:0}
.hdr-icon{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--pri-glow),var(--accent-glow));border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:20px}
.hdr-info h1{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.2px}
.hdr-info span{font-size:11px;color:var(--text2)}
.hdr-actions{margin-left:auto;display:flex;gap:8px}
.btn-h{background:var(--surface2);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;transition:all .2s}
.btn-h:hover{background:var(--surface3);color:var(--text);border-color:var(--border2)}

/* Progress */
.prog{padding:8px 20px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.prog-label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.prog-track{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--pri),var(--accent));border-radius:2px;transition:width .5s}
.prog-count{font-size:11px;color:var(--pri);font-weight:700;font-family:'JetBrains Mono',monospace}

/* Messages */
.msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:10px}
.row{display:flex;flex-direction:column}.row.u{align-items:flex-end}.row.b{align-items:flex-start}
.bub{max-width:88%;padding:14px 18px;border-radius:var(--radius);font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.bub.b{background:var(--bot-bub);color:var(--text);border:1px solid var(--border);border-top-left-radius:4px}
.bub.u{background:var(--user-bub);color:#fff;border:1px solid rgba(38,198,218,.2);border-top-right-radius:4px}
.bub.hint{background:var(--warn-bg);border:1px solid rgba(255,215,64,.2);border-left:3px solid var(--warn)}
.bub.success{background:var(--success-bg);border:1px solid rgba(105,240,174,.15);border-left:3px solid var(--success)}
.bub.answer{background:var(--pri-glow);border:1px solid rgba(38,198,218,.15);border-left:3px solid var(--pri)}
.bub.header{background:transparent;font-weight:700;font-size:15px;color:var(--pri);border:none;padding:14px 0 4px 0}
.bub.incorrect{background:var(--err-bg);border:1px solid rgba(255,82,82,.15);border-left:3px solid var(--err)}
.bub.partial{background:var(--warn-bg);border:1px solid rgba(255,171,0,.15);border-left:3px solid var(--warn-dim)}
.bub.summary{background:linear-gradient(135deg,var(--success-bg),var(--pri-glow));border:1px solid rgba(105,240,174,.15);border-left:3px solid var(--success);font-size:15px}
.bub.adaptive{font-style:italic;font-size:13px;color:var(--text2);border:none;background:transparent;padding:8px 0}
.bub.data-card{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:0;overflow:hidden}
.dc-head{padding:10px 16px;background:var(--surface3);border-bottom:1px solid var(--border);font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.8px;display:flex;align-items:center;gap:8px}
.dc-body{padding:14px 16px;font-size:13px;line-height:1.6;color:var(--text)}
.dc-body table{width:100%;border-collapse:collapse;margin-top:8px}
.dc-body th{text-align:left;padding:6px 10px;background:var(--surface3);color:var(--pri);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--border)}
.dc-body td{padding:6px 10px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text);font-family:'JetBrains Mono',monospace}
.dc-body tr:last-child td{border-bottom:none}
.tag-t{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;font-family:'JetBrains Mono',monospace;margin:1px}
.tag-cat{background:rgba(179,136,255,.15);color:var(--accent)}
.tag-num{background:rgba(38,198,218,.15);color:var(--pri)}
.tag-bool{background:rgba(105,240,174,.15);color:var(--success)}
.tag-ord{background:rgba(255,215,64,.15);color:var(--warn)}

.btn-group{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.btn-pill{background:var(--surface2);border:1.5px solid var(--border2);color:var(--text);border-radius:20px;padding:8px 18px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:all .2s}
.btn-pill:hover{background:var(--pri-glow);border-color:var(--pri);color:var(--pri)}

.input-bar{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;background:var(--surface);flex-shrink:0}
.input-bar textarea{flex:1;padding:10px 16px;border-radius:var(--radius);border:1.5px solid var(--border);font-size:14px;font-family:inherit;outline:none;background:var(--surface2);color:var(--text);resize:none;min-height:42px;max-height:120px;line-height:1.4}
.input-bar textarea:focus{border-color:var(--pri);box-shadow:0 0 0 3px var(--pri-glow)}
.input-bar textarea::placeholder{color:var(--text3)}
.input-bar textarea:disabled{opacity:.4}
.btn-send{background:linear-gradient(135deg,var(--pri-dark),var(--pri));color:var(--bg);border:none;border-radius:var(--radius);padding:10px 22px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;align-self:flex-end;letter-spacing:.2px}
.btn-send:disabled{opacity:.3;cursor:default}
.btn-send:not(:disabled):hover{box-shadow:0 0 20px var(--pri-glow)}

/* Right Panel */
.rpanel{width:0;overflow:hidden;border-left:1px solid var(--border);background:var(--surface);flex-shrink:0;display:flex;flex-direction:column;transition:width .3s}
.rpanel.open{width:380px}
.rp-in{padding:16px;overflow-y:auto;flex:1}
.rp-title{font-weight:700;font-size:15px;margin-bottom:12px;color:var(--pri)}
.rp-sub{font-size:12px;color:var(--text3);margin-bottom:16px}
.card{padding:14px;background:var(--surface2);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:12px}
.card-l{font-size:12px;font-weight:700;margin-bottom:6px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px}
.card-t{font-size:12px;color:var(--text);line-height:1.5}
.tag{display:inline-block;font-size:10px;padding:2px 8px;background:var(--surface3);border-radius:6px;border:1px solid var(--border);color:var(--text2);margin:2px;font-family:'JetBrains Mono',monospace}
.hdots{display:flex;gap:6px;margin-top:4px}
.hdot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace}
.hdot.on{background:var(--warn);color:var(--bg)}.hdot.off{background:var(--surface3);color:var(--text3);border:1px solid var(--border)}
.sc-row{display:flex;justify-content:space-between;font-size:11px;padding:5px 0;border-bottom:1px solid var(--border)}
.sc-row:last-child{border-bottom:none}
.ref-card{padding:12px;background:var(--surface2);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:10px}
.ref-card-t{font-size:12px;font-weight:700;color:var(--pri)}
.ref-card-m{font-size:11px;color:var(--text3);margin-top:2px}
.ref-card-s{margin-top:6px;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;white-space:pre-wrap;font-size:10px;line-height:1.4;max-height:140px;overflow-y:auto;color:var(--text2);font-family:'JetBrains Mono',monospace}

@media(max-width:768px){.rpanel.open{width:100%;position:absolute;right:0;top:0;bottom:0;z-index:10}}
</style>
</head>
<body>
<div class="app">
  <div class="chat-panel">
    <div class="hdr">
      <div class="hdr-icon">📊</div>
      <div class="hdr-info">
        <h1>Data Bot - Data Literacy Challenges</h1>
        <span>AIDA-M01-S02-BOT01 | 12 Challenges</span>
      </div>
      <div class="hdr-actions">
        <button class="btn-h" id="btnRef" onclick="toggleRef()">📋 Demo Ref</button>
        <button class="btn-h" onclick="toggleCtx()">Context ▸</button>
      </div>
    </div>
    <div class="prog">
      <span class="prog-label">Progress</span>
      <div class="prog-track"><div class="prog-fill" id="pFill" style="width:0%"></div></div>
      <span class="prog-count" id="pTxt">0/12</span>
    </div>
    <div class="msgs" id="msgs"></div>
    <div class="input-bar">
      <textarea id="inp" rows="1" placeholder="Select an option above..." disabled
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();submit()}"
        oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
      <button class="btn-send" id="btnS" disabled onclick="submit()">Send</button>
    </div>
  </div>
  <div class="rpanel" id="rp"><div class="rp-in" id="rpc"></div></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// CHALLENGES
// ═══════════════════════════════════════════════════════════
const CH=[
// ── A: CLASSIFY DATA TYPES ──────────────────────────────
{
  id:"A1",type:"Classify Data Types",difficulty:"Easy",title:"Field Classification",icon:"🏷️",
  setup:`A customer database has these fields:

  1. customer_name
  2. age
  3. email
  4. annual_income
  5. subscription_plan (Free / Basic / Premium)
  6. is_active (true / false)
  7. satisfaction_rating (1-5 stars)
  8. signup_date

Classify each field as one of: Categorical (Nominal), Categorical (Ordinal), Numerical (Discrete), Numerical (Continuous), Boolean, or Datetime.

State each classification and a one-line reason.`,
  context:"Foundational data typing. Tests distinction between nominal vs ordinal, discrete vs continuous, and identifying boolean/datetime types.",
  expectedKeywords:[
    ["categorical","nominal","name","text","string"],
    ["numerical","continuous","income","age","number"],
    ["ordinal","rating","plan","rank","order"],
    ["boolean","true","false","binary","is_active"],
    ["datetime","date","timestamp","signup"],
    ["discrete","integer","whole","count"]
  ],
  minMatches:4,
  sampleAnswer:`1. customer_name → Categorical (Nominal) - text labels, no inherent order
2. age → Numerical (Discrete) - whole numbers, countable
3. email → Categorical (Nominal) - unique identifiers, no order
4. annual_income → Numerical (Continuous) - can take any value in a range
5. subscription_plan → Categorical (Ordinal) - categories WITH a rank: Free < Basic < Premium
6. is_active → Boolean - exactly two mutually exclusive states
7. satisfaction_rating → Categorical (Ordinal) - ordered scale 1-5 (not truly continuous)
8. signup_date → Datetime - temporal data, supports date operations`,
  hints:[
    "Start by asking: Is it a number or a label? If a number - can it take any value (continuous) or only whole numbers (discrete)? If a label - do the labels have a meaningful ORDER?",
    "Key distinctions:\n- Nominal = categories without order (colors, names)\n- Ordinal = categories WITH order (ratings, tiers)\n- Discrete = countable numbers (age in years, counts)\n- Continuous = measurable numbers (income, weight)\n- Boolean = exactly 2 states",
    "Tricky ones: satisfaction_rating LOOKS numerical (1-5) but it's ordinal - the gap between 1 and 2 isn't necessarily the same as between 4 and 5. subscription_plan has a clear hierarchy (Free < Basic < Premium), making it ordinal.",
    `💡 Prompt Reveal:\n\n"Classify each field as: Nominal, Ordinal, Discrete, Continuous, Boolean, or Datetime. Decision tree: (1) Is it a date/time? → Datetime. (2) Is it true/false? → Boolean. (3) Is it numeric? → Discrete if countable, Continuous if measurable. (4) Is it a category? → Ordinal if ranked, Nominal if not."\n\nThis decision tree eliminates ambiguity by checking in order.`
  ],
  successMsg:"Clean classifications! The ordinal vs nominal distinction trips many people up. Remember: if you can meaningfully say A > B, it's ordinal. If not, it's nominal.",
  partialMsg:"Some classifications need adjustment. Common mistakes: treating ratings as continuous (they're ordinal), treating subscription_plan as nominal (it has a rank order), or missing that age is discrete (you can't be 25.7 years old in most datasets)."
},
{
  id:"A2",type:"Classify Data Types",difficulty:"Medium-Easy",title:"Messy Data Audit",icon:"🏷️",
  setup:`A team imported data and assigned types automatically. Review their work and flag any MISCLASSIFICATIONS:

  Field               Team's Classification    Sample Values
  ─────────────────────────────────────────────────────────
  zip_code            Numerical (Continuous)   10001, 90210, 60601
  temperature_C       Categorical (Ordinal)    -5, 22.3, 36.8
  shoe_size_EU        Categorical (Nominal)    38, 40, 42, 44
  blood_type          Numerical (Discrete)     A+, B-, O+, AB+
  employee_id         Numerical (Continuous)   E001, E002, E003
  education_level     Categorical (Nominal)    High School, Bachelor's, Master's, PhD

Identify which are WRONG, state the correct type, and explain why the team got it wrong.`,
  context:"Tests ability to spot type errors. Classic traps: zip codes as numbers, ordinal vs nominal, IDs as numbers.",
  expectedKeywords:[
    ["zip","nominal","categorical","not a number","identifier","code"],
    ["temperature","continuous","numerical","measurable","not ordinal"],
    ["shoe","ordinal","ordered","size","rank"],
    ["blood","categorical","nominal","not numerical","label"],
    ["employee","categorical","nominal","identifier","not continuous","id"],
    ["education","ordinal","order","rank","hierarchy","level"]
  ],
  minMatches:5,
  sampleAnswer:`MISCLASSIFICATIONS:

1. zip_code: WRONG → Should be Categorical (Nominal)
   Why wrong: Zip codes look like numbers but aren't - you can't average them or say 90210 > 10001 meaningfully. They're labels/identifiers.

2. temperature_C: WRONG → Should be Numerical (Continuous)
   Why wrong: Temperature is measurable on a continuous scale with decimals. Not ordinal - the intervals between values are equal and meaningful.

3. shoe_size_EU: WRONG → Should be Categorical (Ordinal)
   Why wrong: Shoe sizes have a meaningful order (38 < 40 < 42) but the numeric values are arbitrary scale markers, not true measurements. They're ordered categories.

4. blood_type: WRONG → Should be Categorical (Nominal)
   Why wrong: Blood types are labels (A, B, O, AB) with no inherent order. They contain letters - clearly not numerical.

5. employee_id: WRONG → Should be Categorical (Nominal)
   Why wrong: IDs are identifiers, not quantities. "E001" contains letters. Even numeric IDs shouldn't be treated as numbers.

6. education_level: WRONG → Should be Categorical (Ordinal)
   Why wrong: There's a clear hierarchy: HS < Bachelor's < Master's < PhD. This is ordered, making it ordinal, not nominal.

ALL SIX were misclassified!`,
  hints:[
    "The golden rule: just because something contains digits doesn't make it numerical. Ask: does performing math on this value make sense? Can you meaningfully average zip codes?",
    "Check each one: (1) Can you do arithmetic with it? (2) Does order matter? (3) Is it an identifier or a measurement? These three questions resolve most misclassifications.",
    "Classic traps in data science:\n- Zip codes, phone numbers, IDs → look numeric but are categorical\n- Ratings, sizes, education levels → look nominal but are ordinal\n- Temperatures, prices → look ordinal but are continuous",
    `💡 Prompt Reveal:\n\n"Audit data types by applying three tests per field: (1) Arithmetic test: does mean/sum make sense? (2) Order test: does A > B have meaning? (3) Identifier test: is this a label or a quantity? Reclassify any field that fails the test for its assigned type."\n\nSystematic testing beats intuition for type classification.`
  ],
  successMsg:"All six caught! The zip code trap and the ordinal vs nominal distinction are the two most common data typing errors in real data pipelines. This audit skill prevents analysis errors downstream.",
  partialMsg:"You've caught some errors. Did you check ALL six? Common misses: shoe sizes (ordinal, not nominal - they have an order), and education level (ordinal, not nominal - PhD > Master's > Bachelor's)."
},
{
  id:"A3",type:"Classify Data Types",difficulty:"Medium",title:"Measurement Scales",icon:"🏷️",
  setup:`A research survey collected these data points. Classify each using Stevens' measurement scales: Nominal, Ordinal, Interval, or Ratio.

  1. Gender (Male / Female / Non-binary)
  2. Temperature in Celsius (-10°C to 50°C)
  3. Race finish position (1st, 2nd, 3rd...)
  4. Weight in kg (0 to 200 kg)
  5. Likert scale response (Strongly Disagree=1 to Strongly Agree=5)
  6. Year of birth (1950 to 2005)
  7. Number of children (0, 1, 2, 3...)
  8. Military rank (Private, Corporal, Sergeant...)

The key question: what's the difference between Interval and Ratio? Apply it carefully.`,
  context:"Advanced classification using Stevens' four scales. The interval vs ratio distinction is the key learning moment.",
  expectedKeywords:[
    ["nominal","gender","categories","no order"],
    ["interval","celsius","temperature","no true zero","year","arbitrary zero"],
    ["ratio","weight","kg","true zero","absolute","children","count"],
    ["ordinal","position","rank","likert","military"],
    ["true zero","absolute zero","meaningful zero","zero means none"],
    ["interval","ratio","difference","zero point"]
  ],
  minMatches:5,
  sampleAnswer:`1. Gender → NOMINAL - categories, no order, no arithmetic
2. Temperature (°C) → INTERVAL - ordered, equal intervals, but NO true zero (0°C is arbitrary, not "no temperature")
3. Race position → ORDINAL - ordered but unequal intervals (gap between 1st and 2nd could be 0.1s or 10s)
4. Weight (kg) → RATIO - ordered, equal intervals, AND true zero (0 kg = no weight)
5. Likert scale → ORDINAL - ordered but intervals aren't truly equal (gap between "Agree" and "Strongly Agree" ≠ gap between "Disagree" and "Neutral")
6. Year of birth → INTERVAL - ordered, equal intervals, but no true zero (year 0 is arbitrary)
7. Number of children → RATIO - ordered, equal intervals, true zero (0 = no children), and you CAN say "twice as many"
8. Military rank → ORDINAL - ordered hierarchy but unequal intervals between ranks

KEY INSIGHT: Ratio has a true zero, which lets you say "X is twice as much as Y." Temperature in Celsius can't: 20°C is NOT "twice as hot" as 10°C.`,
  hints:[
    "The Interval vs Ratio question hinges on one thing: does zero mean 'nothing'? 0 kg = no weight (ratio). 0°C ≠ no temperature (interval). Which of your fields have a meaningful zero?",
    "Stevens' scales build on each other:\n  Nominal: just categories\n  Ordinal: categories + order\n  Interval: order + equal spacing\n  Ratio: equal spacing + true zero\nEach level adds a property.",
    "Test for Ratio: Can you say 'X is twice as much as Y'? 10 kg is twice 5 kg (ratio). 20°C is NOT twice as hot as 10°C (interval). This test separates interval from ratio every time.",
    `💡 Prompt Reveal:\n\n"Classify survey data using Stevens' scales. For each field: (1) Are values ordered? No → Nominal. (2) Are intervals equal? No → Ordinal. (3) Is there a true zero (zero = none)? No → Interval. Yes → Ratio. Apply this cascade to each field."\n\nThe cascade eliminates ambiguity by testing properties sequentially.`
  ],
  successMsg:"Excellent! The interval vs ratio distinction is where most people stumble. The 'true zero' test is your sharpest tool: if zero means 'none of the thing,' it's ratio. If zero is arbitrary (like 0°C or year 0), it's interval.",
  partialMsg:"Check Celsius temperature and year of birth carefully. 0°C doesn't mean 'no temperature' - it's an arbitrary point (freezing of water). That makes it interval, not ratio. Same logic for year of birth."
},
{
  id:"A4",type:"Classify Data Types",difficulty:"Hard",title:"Schema Design Edge Cases",icon:"🏷️",
  setup:`You're designing a database schema for a hospital system. For each field, determine the best data type AND explain any edge case that could cause problems if the wrong type is chosen:

  1. patient_age - Should this be stored as an integer or a date-of-birth?
  2. blood_pressure - Format: "120/80" (systolic/diastolic) - single field or two?
  3. pain_level - Patient reports on 0-10 scale
  4. diagnosis_code - ICD-10 codes like "J18.9", "E11.65"
  5. time_of_admission - With patients across time zones
  6. number_of_previous_visits - Including current visit or not?

For each: State the data type, flag the edge case, and describe what goes wrong if you get it wrong.`,
  context:"Applied data typing in a real system. Tests practical understanding of why type decisions matter for data quality, interoperability, and analysis.",
  expectedKeywords:[
    ["date of birth","dob","calculate","age changes","birthday","derived"],
    ["two fields","systolic","diastolic","split","separate","numeric"],
    ["ordinal","subjective","not continuous","pain","scale"],
    ["string","text","categorical","alphanumeric","icd","code","dots"],
    ["timezone","utc","ambiguous","offset","time zone","tz"],
    ["definition","inclusive","exclusive","off by one","current","boundary"]
  ],
  minMatches:5,
  sampleAnswer:`1. patient_age → Store as DATE (date_of_birth), DERIVE age
   Edge case: Age stored as integer becomes stale the day after their birthday. A 59-year-old on Dec 31 is 60 on Jan 1 - but a stored integer won't update. Store DOB, calculate age at query time.
   Wrong type consequence: Incorrect age-based treatment dosages, insurance eligibility errors.

2. blood_pressure → TWO separate numerical fields: systolic_bp (integer), diastolic_bp (integer)
   Edge case: "120/80" as a string can't be queried (e.g., "find patients with systolic > 140"). Parsing the slash is fragile and slow.
   Wrong type consequence: Can't run analytics, can't set clinical alerts, can't sort or filter.

3. pain_level → INTEGER with constraint (0-10), but treat as ORDINAL in analysis
   Edge case: Storing as continuous float suggests false precision (pain 7.3 vs 7.4 is meaningless). The scale is subjective and ordinal.
   Wrong type consequence: Spurious precision in analysis, misleading averages (mean pain of 5.2 is questionable).

4. diagnosis_code → VARCHAR/STRING (not numeric)
   Edge case: "J18.9" contains letters and dots. Numeric type would reject it. Leading zeros in some codes ("001") would be stripped by numeric types.
   Wrong type consequence: Data loss from stripping characters, import failures, broken joins with medical code databases.

5. time_of_admission → TIMESTAMP WITH TIMEZONE (or store in UTC with timezone offset)
   Edge case: A patient admitted at 11 PM in Mumbai (IST) is the previous day in London (GMT). Without timezone, cross-facility reporting breaks.
   Wrong type consequence: Wrong day assignment, medication timing errors, billing date mismatches.

6. number_of_previous_visits → INTEGER with CLEAR DEFINITION: excluding current visit
   Edge case: Does "previous" include the current visit? If yes, the value is always >= 1. If no, a first-time patient has 0. Without a definition, data is inconsistent across entry points.
   Wrong type consequence: Inconsistent counts, broken "first visit" logic, wrong cohort analysis.`,
  hints:[
    "For each field, ask: what operation will we need to perform on this data? If you need to calculate (age), compare (blood pressure), or query (diagnosis codes), the type must support those operations.",
    "Think about what changes over time. Age changes every birthday - so storing a static number is a time bomb. Blood pressure has two components - compressing them into one string prevents analysis.",
    "Edge cases to check for every field: (1) Does the value change over time? (2) Does it contain mixed character types? (3) Can it be NULL? (4) Is there an implicit definition that different people might interpret differently?",
    `💡 Prompt Reveal:\n\n"For each hospital field, determine: storage type, analysis type (may differ!), edge cases around: temporal staleness, composite values, subjectivity, character composition, timezone ambiguity, and definition ambiguity. For each edge case, describe the failure mode if ignored."\n\nSeparating storage type from analysis type catches the pain_level trap (stored as int, analyzed as ordinal).`
  ],
  successMsg:"Thorough analysis! You've identified the gap between storage types and analytical types, caught the temporal staleness of age, and flagged the definition ambiguity in visit counts. This is exactly the thinking that prevents data quality disasters in production systems.",
  partialMsg:"You've got several right. Check: Did you address WHY patient_age should be derived from DOB? Did you flag that blood_pressure must be split? Did you note the timezone issue with admission times?"
},

// ── B: SOURCE RELIABILITY ───────────────────────────────
{
  id:"B1",type:"Source Reliability",difficulty:"Easy",title:"Source Check",icon:"🔍",
  setup:`A colleague sends you a statistic for a presentation:

  "78% of employees prefer hybrid work."
  Source: An online poll on a tech blog, 230 respondents, posted in 2021.

List ALL the reliability concerns with this data point. Think about: who, how many, when, where, and how the data was collected.`,
  context:"Basic source reliability assessment. Tests ability to identify sample size, self-selection, recency, and population representativeness issues.",
  expectedKeywords:[
    ["sample","size","small","230","few","not enough"],
    ["self-select","voluntary","bias","opt-in","online poll","not random"],
    ["tech","blog","skewed","not representative","specific audience","population"],
    ["2021","old","outdated","stale","pre","post-covid","changed","recency"],
    ["methodology","how","survey design","question","wording"],
    ["generalize","represent","all employees","cannot apply","extrapolate"]
  ],
  minMatches:4,
  sampleAnswer:`Reliability concerns:

1. SAMPLE SIZE: 230 is small for generalizing about "employees" broadly. Margin of error is ±6.5% at 95% confidence.

2. SELF-SELECTION BIAS: Online polls attract people who feel strongly about the topic. Those who prefer hybrid work are more motivated to respond than those who are indifferent.

3. POPULATION BIAS: A tech blog audience skews toward tech workers, younger, remote-friendly roles. "78% of tech blog readers" ≠ "78% of employees."

4. RECENCY: 2021 data reflects pandemic-era preferences. Work attitudes have shifted significantly since then. This stat may not reflect current sentiment.

5. METHODOLOGY UNKNOWN: Was the question leading? ("Don't you prefer the flexibility of hybrid work?" vs "Which work arrangement do you prefer?") Question wording dramatically affects responses.

6. NO DEMOGRAPHIC BREAKDOWN: We don't know if respondents are managers vs individual contributors, urban vs rural, or what industries they represent.

VERDICT: This stat is directionally interesting but NOT reliable for a professional presentation. Find a peer-reviewed survey from a research firm with a larger, randomly sampled population.`,
  hints:[
    "Ask the journalism questions: Who was asked? How many? When? How were they recruited? Who published it? Each question can reveal a different reliability issue.",
    "Online polls have a well-known flaw: they only capture people who (a) visit that site and (b) choose to respond. What does that do to the sample?",
    "Consider the context: 2021 was peak COVID remote work. Would this same poll in 2024 give different results? If yes, the data has a recency problem.",
    `💡 Prompt Reveal:\n\n"Evaluate this data source using the CRAAP test: Currency (is it recent enough?), Relevance (does the sample match the claim?), Authority (who collected it?), Accuracy (methodology sound?), Purpose (any agenda?). Flag each dimension that fails."\n\nThe CRAAP framework ensures you check every reliability dimension systematically.`
  ],
  successMsg:"Comprehensive assessment! You identified the critical issues: self-selection, population mismatch, small sample, and recency. In data literacy, knowing when NOT to trust a number is just as important as being able to calculate one.",
  partialMsg:"You've spotted some issues. Did you address: (1) self-selection bias in online polls, (2) the tech blog audience not representing all employees, (3) the 2021 date being potentially outdated? All three are significant."
},
{
  id:"B2",type:"Source Reliability",difficulty:"Medium-Easy",title:"Competing Sources",icon:"🔍",
  setup:`Two sources make conflicting claims about remote work productivity:

SOURCE A:
  "Remote workers are 13% more productive than office workers."
  - Stanford University study (2023)
  - 16,000 participants, randomized controlled trial
  - Published in a peer-reviewed journal
  - Measured: output quantity in a call center

SOURCE B:
  "Remote workers are 10-20% LESS productive."
  - Major consulting firm report (2024)
  - Survey of 500 executives
  - Published as a company white paper
  - Measured: executive perception of team productivity

Which source is MORE reliable and why? Can both be "correct"? Explain.`,
  context:"Tests ability to compare methodological rigor, identify measurement differences, and recognize that conflicting data can coexist when measuring different things.",
  expectedKeywords:[
    ["source a","stanford","more reliable","stronger","better methodology"],
    ["randomized","controlled","rct","experimental","rigorous"],
    ["peer-reviewed","journal","vetted","academic"],
    ["sample size","16000","larger","bigger"],
    ["perception","subjective","opinion","executives","self-report"],
    ["different","measuring","definition","output","productivity","both correct","not same thing"],
    ["white paper","not peer-reviewed","consulting","potential bias","business"]
  ],
  minMatches:5,
  sampleAnswer:`SOURCE A is more methodologically reliable because:

1. DESIGN: Randomized controlled trial (gold standard) vs survey (weaker)
2. SAMPLE: 16,000 participants vs 500 (32x larger)
3. REVIEW: Peer-reviewed journal vs company white paper (no external review)
4. MEASUREMENT: Objective output data vs subjective perception
5. AUTHORITY: Academic institution vs consulting firm (potential business interest in return-to-office)

BUT - both can be "correct" because they're measuring DIFFERENT things:
- Source A measures individual OUTPUT QUANTITY in call centers
- Source B measures EXECUTIVE PERCEPTION of team productivity

These are genuinely different constructs. Workers may produce more individual output at home while executives perceive lower productivity (perhaps because they can't see people working, or collaboration suffers even if individual output rises).

CONCLUSION: Source A is more reliable for the claim "individual output increases remotely." Source B tells us that executives BELIEVE productivity drops - which is useful data about management perception, but NOT reliable data about actual productivity.`,
  hints:[
    "Compare the methodology: one is a randomized controlled trial (the gold standard in research), the other is a survey. Which design produces stronger evidence?",
    "Look at what each source ACTUALLY measured. 'Productivity' isn't a single thing. Source A measured output quantity. Source B measured perception. Are those the same?",
    "Consider potential conflicts of interest. A consulting firm that sells return-to-office strategies has a business incentive. An academic study has peer review as a check. How does this affect reliability?",
    `💡 Prompt Reveal:\n\n"Compare two conflicting sources on: (1) study design strength, (2) sample size, (3) peer review status, (4) objectivity of measurement, (5) potential conflicts of interest, (6) whether they're actually measuring the same construct. Conflicting results often measure different things."\n\nThe insight that both can be 'correct' when constructs differ is key to data literacy.`
  ],
  successMsg:"Excellent analysis! The crucial insight: conflicting studies often measure different things under the same label. 'Productivity' in Source A ≠ 'productivity' in Source B. Always ask: what EXACTLY did they measure?",
  partialMsg:"Good comparison of methodologies. But did you address WHY both could be correct? They're measuring different things: actual output vs perceived productivity. That distinction resolves the 'conflict.'"
},
{
  id:"B3",type:"Source Reliability",difficulty:"Medium",title:"Methodology Autopsy",icon:"🔍",
  setup:`A news headline reads: "New Study: Eating Chocolate Daily Reduces Heart Disease Risk by 37%"

The methodology section of the study reveals:
- Design: Observational cohort study (not an experiment)
- Sample: 4,500 adults in Switzerland, tracked for 5 years
- Data collection: Self-reported food diaries
- Funding: Partially funded by a chocolate industry trade group
- Finding: Participants who reported eating chocolate 5+ times/week had 37% lower rate of heart disease
- Controls: Adjusted for age and gender only

Identify AT LEAST 5 reliability issues that weaken the headline's implied claim.`,
  context:"Tests ability to dissect methodology: observational vs experimental, confounders, self-report bias, funding conflicts, and correlation vs causation.",
  expectedKeywords:[
    ["observational","correlation","not causal","causation","cannot prove","association"],
    ["confound","variable","exercise","income","lifestyle","diet","not controlled","lurking"],
    ["self-report","diary","recall","memory","inaccurate","subjective","honest"],
    ["funding","chocolate","industry","conflict","interest","bias","sponsor"],
    ["switzerland","population","generalize","specific","demographic","western"],
    ["age","gender","only","insufficient","controls","adjusted","not enough"]
  ],
  minMatches:5,
  sampleAnswer:`RELIABILITY ISSUES:

1. CORRELATION ≠ CAUSATION: Observational study cannot prove chocolate CAUSES reduced heart disease. It shows an association only. Perhaps healthier people happen to eat more chocolate.

2. INSUFFICIENT CONFOUNDERS: Only adjusted for age and gender. Missing critical confounders: income (wealthier people eat better chocolate AND have better healthcare), exercise level, overall diet quality, smoking, BMI, stress levels. Any of these could explain the 37%.

3. SELF-REPORT BIAS: Food diaries are notoriously inaccurate. People underreport "bad" foods and overreport "healthy" ones. People who eat chocolate 5x/week may also have different reporting honesty patterns.

4. FUNDING CONFLICT: The chocolate industry trade group has a financial interest in positive findings. Studies funded by industry are significantly more likely to produce favorable results (documented in meta-analyses). This doesn't mean the study is wrong, but it requires extra scrutiny.

5. POPULATION SPECIFICITY: Swiss adults may not represent global populations. Different chocolate types (Swiss dark chocolate vs American milk chocolate), dietary patterns, healthcare access, and genetics all limit generalizability.

6. HEALTHY USER BIAS: People who indulge in daily chocolate guilt-free may be healthier overall (lower stress, better relationship with food). The "type of person" who eats chocolate daily may differ systematically from those who don't.

7. HEADLINE EXAGGERATION: "Reduces risk" implies causation. The study found an association. Responsible headline: "Chocolate consumption associated with lower heart disease rates in observational study."`,
  hints:[
    "The biggest red flag in health reporting: does the study prove CAUSATION or just show CORRELATION? What type of study design is needed to prove causation?",
    "List everything that could be different between chocolate-eaters and non-chocolate-eaters BESIDES the chocolate. Income? Exercise? Stress? Each is a potential confounder.",
    "Three bias checks: (1) Who paid for it? (2) How was data collected? (3) Who was studied? Each reveals a different reliability layer.",
    `💡 Prompt Reveal:\n\n"Dissect a health study claim: (1) Study design → can it prove causation? (2) Confounders → what wasn't controlled? (3) Measurement → self-report reliable? (4) Funding → conflicts of interest? (5) Population → generalizable? (6) Headline vs finding → does the headline overstate?"\n\nThis 6-point framework catches most reliability issues in health/science reporting.`
  ],
  successMsg:"Thorough dissection! You identified the most critical issues: correlation≠causation, insufficient confounder control, and funding conflict. This framework applies to ANY health study reported in media.",
  partialMsg:"Good catches. Make sure you've addressed: (1) the fundamental correlation vs causation issue, (2) the missing confounders beyond age/gender, and (3) the funding source. These three alone disqualify the headline's causal claim."
},
{
  id:"B4",type:"Source Reliability",difficulty:"Hard",title:"Data Pipeline Audit",icon:"🔍",
  setup:`Your company's AI hiring tool claims: "Our algorithm reduces bias by 40% compared to human recruiters."

The data pipeline:
  Step 1: Training data = 50,000 historical hiring decisions from your company (2015-2020)
  Step 2: Features include: university name, years of experience, skills listed, previous company names
  Step 3: Labels = who was hired and who performed well (rated by managers)
  Step 4: Tested on a holdout set from the same dataset
  Step 5: "Bias reduction" measured by comparing demographic parity between AI selections and human selections from 2020

Identify reliability issues at EACH step of this pipeline. Where does the "40% bias reduction" claim break down?`,
  context:"Complex reliability analysis across a multi-step data pipeline. Tests understanding of historical bias encoding, proxy variables, label bias, data leakage, and metrics gaming.",
  expectedKeywords:[
    ["historical","past","bias","encoded","reflect","perpetuate","training data","garbage in"],
    ["proxy","university","company","name","indirect","discriminat","correlated","socioeconomic"],
    ["manager","subjective","label","performance","rating","biased","who rates"],
    ["same","dataset","holdout","leakage","not independent","distribution"],
    ["demographic","parity","metric","measure","insufficient","definition","fairness"],
    ["2015","2020","period","change","shift","different","time","context"]
  ],
  minMatches:5,
  sampleAnswer:`PIPELINE RELIABILITY ISSUES:

STEP 1 - Training Data:
Historical hiring decisions ENCODE existing biases. If your company historically hired fewer women or minorities, the AI learns to replicate that pattern. "50,000 biased decisions" doesn't become unbiased at scale - it becomes precisely biased.

STEP 2 - Features (Proxy Discrimination):
University name correlates with socioeconomic status and race. Previous company names carry similar proxies. The model may use these as stand-ins for protected characteristics without explicitly using race/gender. This is proxy discrimination - legal and ethical risk.

STEP 3 - Labels (Biased Ground Truth):
"Performed well" is defined by manager ratings - which are themselves subject to bias. Research shows systematic bias in performance reviews by race and gender. The labels the AI learns from are contaminated.

STEP 4 - Evaluation (Data Leakage):
Testing on a holdout from the SAME biased dataset proves the model learned the biased patterns accurately - not that it's fair. You need an EXTERNAL, independently evaluated test set with verified fair outcomes.

STEP 5 - Metric Gaming:
"Demographic parity" is one of many fairness metrics, and they can conflict. The model might achieve parity by lowering the bar for one group (patronizing) or by achieving parity on selection rates while maintaining bias in which roles groups are selected for. Comparing to 2020 human decisions (which were also biased) sets a low bar.

THE "40% REDUCTION" IS UNRELIABLE BECAUSE:
- It compares AI bias to human bias from the same biased system
- The training data, labels, and features all carry embedded bias
- The fairness metric is narrow and gameable
- The evaluation uses data from the same biased distribution

REAL TEST: Independent audit with externally defined fair outcomes, multiple fairness metrics, and testing on data from outside your company's historical patterns.`,
  hints:[
    "Start at Step 1: if the historical data contains bias (and most hiring data does), what does the AI learn? The saying 'garbage in, garbage out' applies - but here it's 'bias in, bias out.'",
    "Look at the features in Step 2. University name and previous employers correlate with protected characteristics (race, socioeconomic status). Even without using race directly, the model may be discriminating through proxies.",
    "The 'ground truth' in Step 3 (manager ratings) is itself a product of human judgment. If managers are biased, the labels are biased, and the AI learns to match biased labels. It's bias all the way down.",
    `💡 Prompt Reveal:\n\n"Audit each pipeline step: (1) Training data → historical bias encoded? (2) Features → proxy discrimination? (3) Labels → ground truth contaminated? (4) Evaluation → data leakage or same-distribution testing? (5) Metric → is the fairness definition sufficient and non-gameable? Check if the 'improvement' claim is measuring reduction against an appropriate baseline."\n\nEach step in an ML pipeline can introduce or amplify bias. Reliability requires auditing the full chain.`
  ],
  successMsg:"Outstanding audit! You traced bias through every pipeline step - from training data to features to labels to evaluation to metrics. This 'full-chain' thinking is what real algorithmic auditors do. The key insight: comparing an AI to a biased baseline doesn't prove fairness.",
  partialMsg:"Good analysis of some steps. Make sure you've covered the FULL pipeline: the training data encoding historical bias, university/company names as proxies, manager ratings contaminating labels, AND the evaluation using the same biased distribution. The claim breaks down at every step."
},

// ── C: SPOT BIAS ────────────────────────────────────────
{
  id:"C1",type:"Spot Bias",difficulty:"Easy",title:"Survey Sampling Bias",icon:"⚖️",
  setup:`A city council wants to know if residents support building a new park. They conduct a survey:

  Method: Online survey posted on the city's Facebook page
  Duration: 1 week
  Responses: 1,200
  Result: 82% support the new park

The council presents this as "overwhelming community support." Identify the biases that make this conclusion unreliable.`,
  context:"Selection bias and coverage bias in survey design. Tests understanding of who is and isn't captured by a given methodology.",
  expectedKeywords:[
    ["selection","self-select","voluntary","opt-in","motivated"],
    ["facebook","social media","not everyone","digital","online only","internet"],
    ["older","elderly","young","age","demographic","excluded","don't use"],
    ["favor","support","motivated","people who care","passionate","strong opinion"],
    ["coverage","represent","not all residents","missing","excluded groups"],
    ["non-response","silent","majority","don't respond","apathetic","indifferent"]
  ],
  minMatches:4,
  sampleAnswer:`BIASES:

1. SELF-SELECTION BIAS: People who feel strongly about the park (pro or anti) are more likely to respond. Those indifferent won't bother. Since new amenities tend to excite supporters more than opponents, the poll skews positive.

2. COVERAGE BIAS (Digital Divide): Only reaches Facebook users. This excludes:
   - Elderly residents less likely to use social media
   - Low-income residents with limited internet access
   - Residents who don't follow the city's page

3. PLATFORM BIAS: Facebook's algorithm may not show the post to all followers. Engagement-driven distribution means the survey reaches an algorithmically-filtered subset, not even all Facebook followers.

4. NON-RESPONSE BIAS: The 1,200 who responded are systematically different from the thousands who saw it but didn't respond. Non-responders may lean differently.

5. NO DEMOGRAPHIC WEIGHTING: Even if diverse people responded, the results aren't weighted by actual population demographics. If young people over-responded, the result reflects their preferences disproportionately.

RELIABLE ALTERNATIVE: Random sample of addresses, phone (landline + mobile) survey, or door-to-door canvassing with demographic quotas.`,
  hints:[
    "Who sees a Facebook post? Who doesn't? The people MISSING from your sample are often the ones who would change the result.",
    "Two types of people dominate voluntary surveys: (1) those who strongly support the issue, (2) those who strongly oppose it. Who's missing? The indifferent majority.",
    "Think about your city's demographics. What percentage of elderly residents, non-English speakers, or low-income residents are active on Facebook? That gap is your coverage bias.",
    `💡 Prompt Reveal:\n\n"Identify biases in this survey by checking: (1) Sampling method → random or self-selected? (2) Coverage → who can't access the survey? (3) Non-response → who chooses not to respond? (4) Platform effects → does the distribution channel introduce bias? (5) Weighting → are results adjusted for actual population demographics?"\n\nEvery survey bias falls into one of these categories.`
  ],
  successMsg:"Comprehensive! The Facebook survey is a textbook case of how convenient data collection produces misleading results. The missing voices (elderly, offline, indifferent) are exactly the ones who would change that 82%.",
  partialMsg:"You've identified some biases. Don't miss: (1) the digital divide excluding offline residents, (2) self-selection amplifying strong opinions, and (3) the lack of demographic weighting."
},
{
  id:"C2",type:"Spot Bias",difficulty:"Medium-Easy",title:"Survivorship Bias",icon:"⚖️",
  setup:`A business article claims:

  "Analysis of 50 successful startups shows that all of them pivoted at least once. Therefore, pivoting is essential for startup success."

  The article studied only companies that achieved $100M+ valuations.

What is the FUNDAMENTAL flaw in this analysis? Name the specific type of bias and explain why the conclusion doesn't follow from the data.`,
  context:"Classic survivorship bias. Tests ability to identify the missing data (failures) and explain why conclusions from survivors alone are invalid.",
  expectedKeywords:[
    ["survivor","survivorship","survival","bias","selection"],
    ["failed","failure","didn't survive","dead","shut down","bankrupt"],
    ["missing","not studied","excluded","invisible","only successful"],
    ["pivot","also pivoted","failed startups","could have","may have"],
    ["sample","only winners","one side","incomplete","half the picture"],
    ["conclusion","cannot","doesn't follow","invalid","logical","fallacy"]
  ],
  minMatches:4,
  sampleAnswer:`The fundamental flaw is SURVIVORSHIP BIAS.

The analysis ONLY looked at successful startups ($100M+ valuations). It completely ignores the thousands of startups that:
- Pivoted and STILL FAILED
- Pivoted multiple times and ran out of money
- Pivoted away from a viable idea into a dead end

To know if pivoting is "essential for success," you need to study BOTH successes AND failures. If 90% of failed startups also pivoted, then pivoting tells you nothing about success - it's just something startups do regardless of outcome.

This is like studying only lottery winners and concluding "buying tickets on Tuesdays leads to winning" because they all did. You'd need to check how many Tuesday buyers LOST.

The correct analysis requires a 2x2 comparison:
                  Pivoted    Didn't Pivot
  Successful:      ?            ?
  Failed:          ?            ?

Without the bottom row, the conclusion is logically invalid.`,
  hints:[
    "The study looked at 50 successful startups. What's conspicuously absent from the sample? What category of startups is invisible in this analysis?",
    "If you study only people who survived a war, you might conclude that helmets are unnecessary (because the survivors didn't die). What's wrong with that logic? Same flaw here.",
    "To test 'X causes success,' you need to check: do failures also have X? If yes, X doesn't cause success - it's just common. What would we find if we checked failed startups?",
    `💡 Prompt Reveal:\n\n"Identify the bias in studying only successful outcomes. The flaw: without comparing to FAILURES, any trait found in successes could be: (a) universal (everyone does it), (b) irrelevant (doesn't affect outcome), or (c) actually harmful (more common in failures). Name the specific bias and construct the 2x2 table needed for a valid conclusion."\n\nSurvivorship bias is eliminated by including the 'dead' in your sample.`
  ],
  successMsg:"Nailed it! Survivorship bias is everywhere: business advice from winners, investment strategies from successful funds, career advice from CEOs. The 2x2 table approach (success/failure × has trait/doesn't) is your antidote.",
  partialMsg:"You've identified the issue with looking only at successes. Go further: explicitly name the bias (survivorship bias) and explain what the CORRECT analysis would require (studying both successful AND failed startups that pivoted)."
},
{
  id:"C3",type:"Spot Bias",difficulty:"Medium",title:"Hiring Dataset Audit",icon:"⚖️",
  setup:`A company shares their hiring data to prove they're "objective":

  APPLICANT DATA (last 12 months):
  ─────────────────────────────────────────────────
  Applied   Interviewed   Hired    Acceptance Rate
  ─────────────────────────────────────────────────
  Men:       800       320 (40%)    96 (30%)   12.0%
  Women:     200        60 (30%)    15 (25%)    7.5%
  ─────────────────────────────────────────────────
  Total:    1000       380          111         11.1%

  The company says: "We hire based on merit. The lower rate for women simply reflects the applicant pool."

Identify AT LEAST 4 biases or issues in this data and the company's interpretation.`,
  context:"Multiple intersecting biases in hiring data: pipeline bias, rate disparities, structural barriers, Simpson's paradox potential, and self-serving interpretation.",
  expectedKeywords:[
    ["pipeline","funnel","applicant pool","why fewer","apply","80-20","imbalance"],
    ["interview","rate","40%","30%","gap","disparity","screen","different rate"],
    ["structural","job posting","description","requirements","barrier","attract","deter","pipeline problem"],
    ["merit","claim","assumption","circular","define","criteria","who defines"],
    ["sample","small","15","women hired","too few","statistical","significance"],
    ["department","role","simpson","breakdown","aggregate","hidden","within"]
  ],
  minMatches:4,
  sampleAnswer:`BIASES AND ISSUES:

1. PIPELINE BIAS (WHY only 20% women applicants?)
The 80/20 split is itself a red flag. Why are so few women applying? Possible causes: gendered job descriptions, limited recruiting channels, reputation, hostile culture signals. The company treats the skewed pipeline as a given, not a problem.

2. INTERVIEW RATE DISPARITY (40% vs 30%)
Women are 25% LESS likely to be called for interviews than men (30% vs 40%). If hiring is "merit-based," why does the first filter already show a gap? This suggests bias in resume screening.

3. INTERVIEW-TO-HIRE RATE DISPARITY (30% vs 25%)
Among those interviewed, women are also less likely to be hired. The bias compounds at every stage of the funnel.

4. SMALL SAMPLE PROBLEM
Only 15 women were hired. This is too small for statistically robust conclusions. A single additional hire changes the rate by nearly 7%. The company can't claim objectivity from such small numbers.

5. "MERIT" IS UNDEFINED
"We hire based on merit" begs the question: who defined the merit criteria? If criteria include things that correlate with gender (uninterrupted career history penalizes women who took parental leave, "culture fit" is subjective), then "merit-based" can still be biased.

6. AGGREGATE HIDING DISPARITIES
The overall 11.1% hire rate masks the 12% vs 7.5% gap. And without department-level breakdowns, we can't see if Simpson's paradox is at play - women might be applying to more competitive roles, hiding even larger within-role disparities.

7. SELF-SERVING FRAMING
"Reflects the applicant pool" shifts responsibility to external factors. But the applicant pool IS shaped by the company's choices (where they recruit, what the postings say, what their reputation signals).`,
  hints:[
    "Don't accept the applicant pool as a given. WHY is it 80/20? The pipeline itself may be biased. Who's responsible for that imbalance?",
    "Compare the RATES at each funnel stage, not just the final numbers. Interview rate: 40% vs 30%. That gap exists before any 'merit assessment' happens. What does that tell you?",
    "With only 15 women hired, how statistically meaningful is the 7.5% vs 12% comparison? And 'merit' - who defined it? If the criteria themselves are biased, 'merit-based' is a circular argument.",
    `💡 Prompt Reveal:\n\n"Audit hiring data for: (1) Pipeline bias - why is the applicant pool skewed? (2) Stage-by-stage rate comparison - where do gaps appear? (3) Sample adequacy - are subgroups large enough for valid comparison? (4) Criteria bias - are 'merit' definitions neutral? (5) Aggregation hiding - could department-level data show different patterns? (6) Framing bias - is the company's interpretation self-serving?"\n\nBias in hiring data is multi-layered. You must audit the pipeline, the criteria, and the interpretation.`
  ],
  successMsg:"Thorough audit! You caught the multi-stage funnel bias, questioned the pipeline itself, flagged the small sample, and challenged the 'merit' framing. Real-world data audits require exactly this kind of layered skepticism.",
  partialMsg:"Good points. Make sure you've challenged: (1) the pipeline imbalance (WHY only 20% women applicants?), (2) the RATE disparities at each funnel stage (not just final numbers), and (3) the undefined 'merit' criteria."
},
{
  id:"C4",type:"Spot Bias",difficulty:"Hard",title:"Healthcare Algorithm Bias",icon:"⚖️",
  setup:`A widely-used healthcare algorithm assigns risk scores to patients to determine who gets extra care. An audit reveals:

DATA:
- Algorithm assigns risk scores 0-100 based on healthcare COSTS from the previous year
- Higher score → more likely to be enrolled in a special care program
- At the same risk score (e.g., score of 50), Black patients are SICKER than white patients (more chronic conditions, worse lab results)
- The algorithm uses COST as a proxy for HEALTH NEED

OUTCOMES:
- Only 17.7% of patients identified as high-risk are Black
- If the algorithm used actual health measures instead of cost, 46.5% would be Black

This is a real case (Obermeyer et al., 2019). Explain:
1. WHY does using cost as a proxy for health need create racial bias?
2. What is the ROOT CAUSE in the real world that makes cost ≠ need?
3. What would a less biased alternative look like?`,
  context:"Real-world algorithmic bias case study. Tests understanding of proxy variables, structural inequality encoding, and the difference between equal treatment and equitable outcomes.",
  expectedKeywords:[
    ["cost","proxy","health","need","not same","spending","different"],
    ["access","barrier","afford","insurance","uninsured","underinsured","utilization"],
    ["structural","systemic","inequ","racism","discrimination","historic","disparit"],
    ["less","spend","lower cost","fewer visits","doesn't mean","healthier","sicker but"],
    ["direct","health","measure","clinical","lab","conditions","actual","symptoms"],
    ["trust","distrust","medical","history","tuskegee","avoid","reluctan"]
  ],
  minMatches:5,
  sampleAnswer:`1. WHY COST ≠ HEALTH NEED CREATES RACIAL BIAS:

The algorithm assumes: higher healthcare spending = sicker patient. But Black patients in the US systematically SPEND LESS on healthcare than white patients at the SAME level of sickness. So the algorithm interprets lower spending as "healthier" when in reality these patients are just as sick or sicker - they're just not receiving as much care.

The result: at any given risk score, Black patients have more chronic conditions than white patients with the same score. The algorithm systematically underestimates Black patients' health needs.

2. ROOT CAUSES (Why cost ≠ need for Black patients):

a) ACCESS BARRIERS: Higher rates of being uninsured or underinsured, fewer nearby providers, less ability to take time off work for appointments

b) HISTORICAL DISTRUST: Documented history of medical mistreatment (Tuskegee experiment, forced sterilizations) leads to lower healthcare utilization even when available

c) PROVIDER BIAS: Studies show Black patients receive less aggressive treatment, fewer referrals, and less pain medication for the same conditions - resulting in lower costs not by choice

d) ECONOMIC INEQUALITY: Lower average income means fewer elective procedures, delayed care, and more reliance on emergency rooms (which are expensive but less frequent than ongoing specialist care)

The algorithm doesn't CAUSE the bias - it ENCODES existing structural inequality into an automated system, then scales it to millions of patients.

3. LESS BIASED ALTERNATIVE:

- Use direct health measures: number of chronic conditions, lab results (A1C, blood pressure, cholesterol), emergency room visits, medication needs
- These measure ACTUAL health status rather than system access
- The Obermeyer study showed this would increase Black patient representation in care programs from 17.7% to 46.5% - nearly tripling access to needed care
- Additionally: audit algorithms regularly with disaggregated performance metrics by race, income, and geography`,
  hints:[
    "The core question: does spending more on healthcare always mean you're sicker? Think about who has access to healthcare and who doesn't. If two patients are equally sick but one faces barriers to care, who spends more?",
    "In the US healthcare system, spending is shaped by: insurance status, proximity to providers, income, trust in medical institutions, and provider behavior. All of these correlate with race. So cost is a PROXY that encodes structural inequality.",
    "Think of it this way: using cost as a proxy for need is like using 'number of umbrellas owned' as a proxy for 'how often it rains where you live.' Wealthy people in dry climates may own more umbrellas than poor people in rainy areas. The proxy measures access to umbrellas, not rainfall.",
    `💡 Prompt Reveal:\n\n"Analyze why cost-as-proxy-for-health-need creates racial bias. Framework: (1) Does the proxy correlate equally with the target variable across all groups? (2) What structural factors cause the proxy to behave differently per group? (3) What direct measurements could replace the proxy? (4) What is the real-world impact of the bias (quantify if possible)?"\n\nProxy bias occurs whenever a proxy variable's relationship to the target differs across protected groups due to structural factors.`
  ],
  successMsg:"Exceptional analysis. You connected the proxy variable problem to its structural root causes and identified a concrete alternative. This case (Obermeyer 2019) is now a canonical example in algorithmic fairness. The lesson: any algorithm that uses a proxy shaped by inequality will encode that inequality.",
  partialMsg:"You've identified the core proxy problem. Go deeper: WHY do Black patients spend less at the same sickness level? The root causes are structural (access barriers, insurance disparities, historical distrust, provider bias). And what would a fairer algorithm use instead of cost?"
}
];

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let S={phase:"welcome",queue:[],idx:-1,hu:0,hh:[],scores:[],pm:null,cc:null};

const $m=document.getElementById("msgs"),$i=document.getElementById("inp"),
  $s=document.getElementById("btnS"),$pf=document.getElementById("pFill"),
  $pt=document.getElementById("pTxt"),$rp=document.getElementById("rp"),
  $rc=document.getElementById("rpc");

function scr(){setTimeout(()=>$m.scrollTop=$m.scrollHeight,50)}
function uProg(){$pf.style.width=(S.scores.length/12*100)+"%";$pt.textContent=S.scores.length+"/12"}
function enInp(on,ph){$i.disabled=!on;$s.disabled=!on;$i.placeholder=ph||(on?"Type your analysis...":"Select an option above...");if(on)$i.focus()}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

function addB(text,style,buttons){
  const r=document.createElement("div");r.className="row b";
  const b=document.createElement("div");b.className="bub b"+(style?" "+style:"");
  b.textContent=text;r.appendChild(b);
  if(buttons&&buttons.length){
    const g=document.createElement("div");g.className="btn-group";
    buttons.forEach(l=>{const bt=document.createElement("button");bt.className="btn-pill";bt.textContent=l;bt.onclick=()=>hBtn(l);g.appendChild(bt)});
    r.appendChild(g);
  }
  $m.appendChild(r);scr();
}
function addU(text){const r=document.createElement("div");r.className="row u";const b=document.createElement("div");b.className="bub u";b.textContent=text;r.appendChild(b);$m.appendChild(r);scr()}

function addDataCard(title,icon,html){
  const r=document.createElement("div");r.className="row b";
  const c=document.createElement("div");c.className="bub b data-card";c.style.maxWidth="95%";
  c.innerHTML=`<div class="dc-head">${icon} ${title}</div><div class="dc-body">${html}</div>`;
  r.appendChild(c);$m.appendChild(r);scr();
}

function evaluate(text,ch){
  const lo=text.toLowerCase();let m=0;
  ch.expectedKeywords.forEach(g=>{if(g.some(k=>lo.includes(k.toLowerCase())))m++});
  if(m>=ch.minMatches)return"correct";
  if(m/ch.expectedKeywords.length>=0.3)return"partial";
  return"incorrect";
}
function getAd(){const h=S.hh;if(h.length<2)return null;const a=h.slice(-2).reduce((x,y)=>x+y,0)/2;
  if(a<=1)return{s:"adaptive",t:"📈 Sharp analysis! Increasing complexity."};
  if(a>=3)return{s:"adaptive",t:"🔄 These are meaty problems. Take your time."};return null}

// PANEL
function rCtx(ch){
  if(!ch){$rc.innerHTML="";return}
  let h=`<div class="rp-title">${ch.icon} Challenge Context</div><div class="rp-sub">${ch.type} | ${ch.difficulty}</div>
    <div class="card"><div class="card-l">Objective</div><div class="card-t">${ch.context}</div></div>
    <div class="card"><div class="card-l">Keywords Evaluated</div><div style="margin-top:6px">`;
  ch.expectedKeywords.flat().slice(0,14).forEach(k=>{h+=`<span class="tag">${esc(k)}</span>`});
  h+=`</div></div><div class="card"><div class="card-l">Hints</div><div class="hdots">`;
  for(let i=1;i<=4;i++)h+=`<div class="hdot ${i<=S.hu?'on':'off'}">${i}</div>`;
  h+=`</div></div>`;
  if(S.scores.length){h+=`<div class="card"><div class="card-l">Results</div>`;S.scores.forEach(s=>{h+=`<div class="sc-row"><span style="color:var(--text2)">${s.id}</span><span style="color:${s.r==='correct'?'var(--success)':'var(--warn)'}">${s.r==='correct'?'✅':'💡'} ${s.h}h</span></div>`});h+=`</div>`}
  $rc.innerHTML=h;
}
function rRef(){
  let h=`<div class="rp-title">📋 Demo Reference</div><p class="rp-sub">Click buttons or type sample answers.</p>`;
  CH.forEach(c=>{const sa=c.sampleAnswer.length>260?c.sampleAnswer.substring(0,260)+"...":c.sampleAnswer;
    h+=`<div class="ref-card"><div class="ref-card-t">${c.icon} ${c.id}: ${c.title}</div><div class="ref-card-m">${c.difficulty} | ${c.type}</div><div class="ref-card-s">${esc(sa)}</div></div>`});
  $rc.innerHTML=h;
}
function toggleRef(){if(S.pm==="ref"){S.pm=null;$rp.classList.remove("open");document.getElementById("btnRef").textContent="📋 Demo Ref"}
  else{S.pm="ref";$rp.classList.add("open");rRef();document.getElementById("btnRef").textContent="Hide Ref"}}
function toggleCtx(){if(S.pm==="ctx"){S.pm=null;$rp.classList.remove("open")}
  else{S.pm="ctx";$rp.classList.add("open");rCtx(S.cc)}}
function sCtx(ch){S.cc=ch;if(S.pm==="ctx")rCtx(ch)}

// FLOW
function present(){
  const ch=S.queue[S.idx];S.hu=0;sCtx(ch);
  const a=getAd();if(a)addB(a.t,a.s);
  addB(`── ${ch.icon} ${ch.type} | ${ch.id} | ${ch.difficulty} ──\n\n${ch.title}`,"header");
  setTimeout(()=>{addB(ch.setup);S.phase="challenge";enInp(true)},300);
}
function advance(){
  S.idx++;
  if(S.idx>=S.queue.length){
    S.phase="allDone";sCtx(null);
    const c=S.scores.filter(x=>x.r==="correct").length,th=S.scores.reduce((a,x)=>a+x.h,0);
    const v=c>=10?"Outstanding data literacy. You're audit-ready.":c>=7?"Strong performance. Review the challenges where you used 3+ hints.":"Good foundation. Revisit the hint frameworks - they're reusable tools.";
    addB(`🏁 All challenges complete!\n\nScore: ${c}/${S.scores.length} first-attempt successes\nHints used: ${th}\n\n${v}`,"summary");
    setTimeout(()=>{addB("Go again?",null,["🏷️ Data Types","🔍 Source Reliability","⚖️ Spot Bias","▶️ All 12"]);S.phase="selectType";enInp(false)},600);
    return;
  }
  present();
}
function showOk(ch){
  addB("✅ "+ch.successMsg,"success");
  S.scores.push({id:ch.id,r:"correct",h:S.hu});S.hh.push(S.hu);uProg();
  setTimeout(()=>{addB("Moving on.",null,["▶️ Next","📋 Model Answer"]);S.phase="hint";enInp(false)},300);
}
function showFull(ch){
  addB("Here's the model answer:\n\n"+ch.sampleAnswer,"answer");
  setTimeout(()=>{S.scores.push({id:ch.id,r:"hinted",h:4});S.hh.push(4);uProg();
    addB("Study this, then continue.",null,["▶️ Next"]);S.phase="hint";enInp(false)},400);
}

// HANDLERS
function hBtn(l){
  addU(l);
  if(S.phase==="selectType"){
    let q;
    if(l.includes("Types"))q=CH.filter(c=>c.type==="Classify Data Types");
    else if(l.includes("Reliability"))q=CH.filter(c=>c.type==="Source Reliability");
    else if(l.includes("Bias"))q=CH.filter(c=>c.type==="Spot Bias");
    else q=[...CH];
    S.queue=q;S.idx=0;S.scores=[];S.hh=[];uProg();present();return;
  }
  if(l==="💡 Hint"){
    const ch=S.queue[S.idx],hi=S.hu;
    if(hi<4){addB(`Hint ${hi+1}/4:\n\n${ch.hints[hi]}`,"hint");S.hu=hi+1;sCtx(ch);
      if(hi+1===4)setTimeout(()=>showFull(ch),300)}
    return;
  }
  if(l==="▶️ Next"){advance();return}
  if(l==="📋 Model Answer"){addB("Model answer:\n\n"+S.queue[S.idx].sampleAnswer,"answer");return}
}
function submit(){
  const t=$i.value.trim();if(!t||S.phase!=="challenge")return;
  $i.value="";$i.style.height="auto";addU(t);
  const ch=S.queue[S.idx],r=evaluate(t,ch);
  setTimeout(()=>{
    if(r==="correct")showOk(ch);
    else if(r==="partial"){addB("🔶 "+ch.partialMsg,"partial");setTimeout(()=>addB("Expand your analysis or get a hint.",null,["💡 Hint"]),200)}
    else{addB("Not quite there. Let's dig deeper.","incorrect");setTimeout(()=>addB("Try again or get a hint.",null,["💡 Hint"]),200)}
  },400);
}

// INIT
(function(){
  addB("Welcome to the Data Literacy Challenge Lab. 📊");
  setTimeout(()=>{
    addB("12 challenges across three critical data skills:\n\n🏷️ Classify Data Types (4) - Field classification, measurement scales, schema design\n🔍 Source Reliability (4) - Evaluate claims, compare sources, audit pipelines\n⚖️ Spot Bias (4) - Survey bias, survivorship bias, algorithmic fairness\n\nProgressive difficulty within each type. Adaptive pacing based on your performance.");
    setTimeout(()=>{
      addB("Each challenge has 4 progressive hints. Hint 4 reveals a reusable analytical framework.\n\nReady to sharpen your data instincts?",null,
        ["🏷️ Data Types","🔍 Source Reliability","⚖️ Spot Bias","▶️ All 12"]);
      S.phase="selectType";
    },300);
  },200);
})();
</script>
