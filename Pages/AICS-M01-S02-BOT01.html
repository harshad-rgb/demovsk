<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Practice Bot - Algorithms & Pseudocode | AICS-M01-S02-BOT01</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --primary:#1E88E5;--primary-dark:#1565C0;--primary-light:#E3F2FD;
  --secondary:#29B6F6;--success:#4CAF50;--success-light:#E8F5E9;
  --warning:#FFB300;--warning-light:#FFF8E1;
  --error:#E53935;--error-light:#FFEBEE;
  --bg:#FFFFFF;--bot-bubble:#F5F5F5;--user-bubble:#1E88E5;
  --text-primary:#212121;--text-secondary:#757575;
  --surface:#FAFAFA;--border:#E0E0E0;
  --code-bg:#1E1E2A;--code-text:#D4D4D4;
  --radius-sm:8px;--radius-md:12px;--radius-lg:16px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text-primary);height:100vh;overflow:hidden}
.app{display:flex;height:100vh}

/* Chat Panel */
.chat-panel{flex:1;display:flex;flex-direction:column;min-width:0}
.chat-header{padding:12px 16px;background:var(--primary);color:#fff;display:flex;align-items:center;gap:12px;flex-shrink:0}
.avatar{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:18px}
.header-info h1{font-size:15px;font-weight:700}
.header-info span{font-size:11px;opacity:.85}
.header-actions{margin-left:auto;display:flex;gap:8px}
.btn-hdr{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:var(--radius-sm);padding:6px 12px;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;transition:background .15s}
.btn-hdr:hover{background:rgba(255,255,255,.35)}

.progress-bar{padding:6px 16px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.progress-label{font-size:11px;color:var(--text-secondary);font-weight:600}
.progress-track{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--success);border-radius:3px;transition:width .4s}

.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
.msg-row{display:flex;flex-direction:column}
.msg-row.user{align-items:flex-end}
.msg-row.bot{align-items:flex-start}
.bubble{max-width:88%;padding:12px 16px;border-radius:var(--radius-lg);font-size:14px;line-height:1.55;white-space:pre-wrap;word-break:break-word}
.bubble.bot{background:var(--bot-bubble);color:var(--text-primary);border-top-left-radius:4px}
.bubble.user{background:var(--user-bubble);color:#fff;border-top-right-radius:4px}
.bubble.hint{background:var(--warning-light);border-left:3px solid var(--warning)}
.bubble.success{background:var(--success-light);border-left:3px solid var(--success)}
.bubble.answer{background:var(--primary-light);border-left:3px solid var(--primary)}
.bubble.header{background:transparent;font-weight:700;font-size:15px;color:var(--primary)}
.bubble.incorrect{background:var(--error-light);border-left:3px solid var(--error)}
.bubble.partial{background:#FFF3E0;border-left:3px solid #FF9800}
.bubble.summary{background:var(--success-light);border-left:3px solid var(--success);font-size:15px}
.bubble.adaptive{font-style:italic;font-size:13px}
.bubble.boost{background:var(--primary-light)}
.bubble.support{background:var(--warning-light)}
.bubble.code-block{background:var(--code-bg);color:var(--code-text);font-family:'Fira Code',monospace;font-size:13px;line-height:1.6;border-radius:var(--radius-md);border:none;padding:16px}
.bubble.python{background:#1a2332;color:#D4D4D4;font-family:'Fira Code',monospace;font-size:13px;line-height:1.6;border-radius:var(--radius-md);border-left:3px solid #306998;padding:16px}
.bubble .pyhead{color:#306998;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;font-family:'Inter',sans-serif}
.bubble .output-head{color:var(--success);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;margin-top:12px;font-family:'Inter',sans-serif}

.btn-group{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.btn-pill{background:transparent;border:1.5px solid var(--primary);color:var(--primary);border-radius:20px;padding:8px 16px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:all .15s}
.btn-pill:hover{background:var(--primary);color:#fff}

.input-bar{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;background:var(--bg);flex-shrink:0}
.input-bar textarea{flex:1;padding:10px 16px;border-radius:16px;border:1.5px solid var(--border);font-size:14px;font-family:inherit;outline:none;background:#fff;resize:none;min-height:42px;max-height:120px;line-height:1.4}
.input-bar textarea:focus{border-color:var(--primary)}
.input-bar textarea:disabled{background:var(--surface)}
.btn-send{background:var(--primary);color:#fff;border:none;border-radius:20px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;align-self:flex-end}
.btn-send:disabled{background:var(--border);cursor:default}
.btn-send:not(:disabled):hover{background:var(--primary-dark)}

/* Right Panel */
.right-panel{width:0;overflow:hidden;border-left:1px solid var(--border);background:var(--surface);flex-shrink:0;display:flex;flex-direction:column;transition:width .3s}
.right-panel.open{width:380px}
.rp-inner{padding:16px;overflow-y:auto;flex:1}
.panel-title{font-weight:700;font-size:15px;margin-bottom:12px;color:var(--primary)}
.panel-sub{font-size:12px;color:var(--text-secondary);margin-bottom:16px}
.card{padding:12px;background:#fff;border-radius:var(--radius-md);border:1px solid var(--border);margin-bottom:12px}
.card-label{font-size:12px;font-weight:700;margin-bottom:4px}
.card-text{font-size:12px;color:var(--text-secondary);line-height:1.5}
.tag{display:inline-block;font-size:10px;padding:2px 8px;background:var(--surface);border-radius:10px;border:1px solid var(--border);color:var(--text-secondary);margin:2px}
.hint-dots{display:flex;gap:6px;margin-top:4px}
.hint-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.hint-dot.used{background:var(--warning);color:#fff;border:1px solid var(--warning)}
.hint-dot.unused{background:var(--surface);color:var(--text-secondary);border:1px solid var(--border)}
.score-row{display:flex;justify-content:space-between;font-size:11px;padding:4px 0;border-bottom:1px solid var(--surface)}
.score-row:last-child{border-bottom:none}
.ref-card{padding:12px;background:#fff;border-radius:var(--radius-md);border:1px solid var(--border);margin-bottom:10px}
.ref-card-title{font-size:12px;font-weight:700;color:var(--primary)}
.ref-card-meta{font-size:11px;color:var(--text-secondary);margin-top:2px}
.ref-card-sample{margin-top:6px;padding:8px;background:var(--code-bg);color:var(--code-text);border-radius:6px;white-space:pre-wrap;font-size:10px;line-height:1.4;max-height:140px;overflow-y:auto;font-family:'Fira Code',monospace}
.trace-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.trace-table th{background:var(--primary);color:#fff;padding:6px 8px;text-align:left;font-weight:600;font-size:11px}
.trace-table td{padding:5px 8px;border-bottom:1px solid var(--border);font-family:'Fira Code',monospace;font-size:11px}
.trace-table tr:nth-child(even) td{background:var(--surface)}

@media(max-width:768px){.right-panel.open{width:100%;position:absolute;right:0;top:0;bottom:0;z-index:10}}
</style>
</head>
<body>
<div class="app">
  <div class="chat-panel">
    <div class="chat-header">
      <div class="avatar">⚡</div>
      <div class="header-info">
        <h1>Algorithms & Pseudocode Practice Lab</h1>
        <span>AICS-M01-S02-BOT01 | 12 Challenges</span>
      </div>
      <div class="header-actions">
        <button class="btn-hdr" id="btnRef" onclick="toggleReference()">📋 Demo Reference</button>
        <button class="btn-hdr" onclick="togglePanel()">Context ▸</button>
      </div>
    </div>
    <div class="progress-bar">
      <span class="progress-label">Progress</span>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <span class="progress-label" id="progressText">0/12</span>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-bar">
      <textarea id="userInput" rows="1" placeholder="Select an option above..." disabled
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();handleSubmit()}"
        oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
      <button class="btn-send" id="btnSend" disabled onclick="handleSubmit()">Send</button>
    </div>
  </div>
  <div class="right-panel" id="rightPanel">
    <div class="rp-inner" id="rpContent"></div>
  </div>
</div>

<script>
// ═════════════════════════════════════════════════════════════
// CHALLENGE DATA
// ═════════════════════════════════════════════════════════════
const CH = [
// ── TYPE A: PSEUDOCODE WRITING ──────────────────────────────
{
  id:"A1",type:"Pseudocode Writing",difficulty:"Easy",title:"Find the Maximum",icon:"✏️",
  setup:"Task: Given a list of numbers, find and return the largest number.\n\nExample input:  [3, 7, 2, 9, 4]\nExpected output: 9\n\nWrite pseudocode to solve this. Use plain English-like steps - no specific programming language needed.",
  context:"Tests basic iteration and comparison logic. Learner should initialize a tracker variable and loop through the list.",
  expectedKeywords:[
    ["set","initialize","let","max","largest","biggest","first","start"],
    ["loop","for each","for","iterate","go through","traverse"],
    ["compare","if","greater","bigger","more than",">","check"],
    ["update","replace","set max","assign","change"],
    ["return","output","print","display","result"]
  ],
  minMatches:4,
  sampleAnswer:"SET max_value = first element of list\nFOR EACH number IN list:\n    IF number > max_value THEN\n        SET max_value = number\nRETURN max_value",
  pythonCode:"def find_max(numbers):\n    max_val = numbers[0]\n    for num in numbers:\n        if num > max_val:\n            max_val = num\n    return max_val\n\nprint(find_max([3, 7, 2, 9, 4]))",
  pythonOutput:"9",
  hints:[
    "You need to remember the biggest number you've seen so far as you walk through the list. What variable do you need?",
    "The pattern is: (1) Start with an assumption (first element is max), (2) Compare every element against your current max, (3) Update when you find something bigger. Write these steps.",
    "Similar task: Finding the tallest person in a room. You'd: (1) Assume the first person is tallest, (2) Compare each next person, (3) If taller, they become your new 'tallest'. Same algorithm.",
    "💡 Prompt Reveal:\n\n\"Write pseudocode to find the maximum value in a list. Use: a tracker variable initialized to the first element, a loop over all elements, a comparison that updates the tracker, and a return statement.\"\n\nNaming each component (tracker, loop, comparison, return) ensures completeness."
  ],
  successMsg:"Clean pseudocode! The pattern - initialize, iterate, compare, update - is the foundation of many search algorithms.",
  partialMsg:"You have the right idea but some steps are missing. Make sure you cover: initialization, looping, comparison, updating, and returning the result."
},
{
  id:"A2",type:"Pseudocode Writing",difficulty:"Medium-Easy",title:"Count Long Words",icon:"✏️",
  setup:"Task: Given a sentence, count how many words have more than 5 characters.\n\nExample input:  \"The algorithm processes information efficiently\"\nExpected output: 3 (algorithm=9, processes=9, information=11, efficiently=11... wait, let me recount: \"algorithm\"=9, \"processes\"=9, \"information\"=11, \"efficiently\"=11 → 4 words >5 chars)\n\nActually: \"The\"=3, \"algorithm\"=9 ✓, \"processes\"=9 ✓, \"information\"=11 ✓, \"efficiently\"=11 ✓ → 4\n\nExpected output: 4\n\nWrite pseudocode. Think about: how do you break a sentence into words? How do you check each one?",
  context:"Tests string splitting, iteration, conditional counting. Learner should split the sentence, loop through words, check length, and count.",
  expectedKeywords:[
    ["split","break","separate","divide","words","tokenize"],
    ["loop","for each","for","iterate","go through"],
    ["length","count","characters","size","len"],
    ["if",">","greater","more than","5","check","longer"],
    ["counter","count","increment","add","tally","total"],
    ["return","output","print"]
  ],
  minMatches:4,
  sampleAnswer:"SET words = SPLIT sentence BY spaces\nSET count = 0\nFOR EACH word IN words:\n    IF LENGTH(word) > 5 THEN\n        SET count = count + 1\nRETURN count",
  pythonCode:"def count_long_words(sentence):\n    words = sentence.split()\n    count = 0\n    for word in words:\n        if len(word) > 5:\n            count += 1\n    return count\n\nprint(count_long_words(\"The algorithm processes information efficiently\"))",
  pythonOutput:"4",
  hints:[
    "Two sub-problems here: (1) Turn a sentence into individual words, (2) Check each word. What operation breaks a string into parts?",
    "After splitting, you need a counter starting at 0. For each word, check its length against 5. If it passes, bump the counter. Classic filter-and-count pattern.",
    "Similar: Counting how many items in a shopping cart cost over $10. (1) Go through each item, (2) Check price > 10, (3) If yes, add 1 to counter. Same structure - just swap 'price' for 'length'.",
    "💡 Prompt Reveal:\n\n\"Write pseudocode: split sentence into words, initialize counter to 0, loop through words, if word length > 5 then increment counter, return counter.\"\n\nExplicitly listing each operation prevents missed steps."
  ],
  successMsg:"Solid! Split → Loop → Filter → Count is a pattern you'll use constantly. Notice it combines the filter pattern with an accumulator.",
  partialMsg:"Good direction. Make sure you have: (1) splitting the sentence, (2) a counter variable, (3) a length check, and (4) incrementing on match."
},
{
  id:"A3",type:"Pseudocode Writing",difficulty:"Medium",title:"Second Highest Score",icon:"✏️",
  setup:"Task: Given a list of scores, find the SECOND highest score. Do NOT sort the list.\n\nExample input:  [45, 82, 91, 67, 91, 73]\nExpected output: 82\n\nNote: If the highest appears multiple times (91 appears twice), the second highest is still the next distinct value (82).\n\nWrite pseudocode. This is trickier than finding just the max - think about what variables you need to track.",
  context:"Tests ability to maintain two tracker variables and handle edge cases (duplicates). A meaningful step up from simple max-finding.",
  expectedKeywords:[
    ["first","highest","max","top","biggest"],
    ["second","next","runner","2nd"],
    ["two","both","pair","track","maintain","variables"],
    ["loop","for each","iterate","go through"],
    ["compare","if","check","greater","less"],
    ["update","swap","shift","replace","move"],
    ["duplicate","same","equal","distinct","skip","not equal"]
  ],
  minMatches:5,
  sampleAnswer:"SET first = -infinity\nSET second = -infinity\nFOR EACH score IN list:\n    IF score > first THEN\n        SET second = first\n        SET first = score\n    ELSE IF score > second AND score != first THEN\n        SET second = score\nRETURN second",
  pythonCode:"def second_highest(scores):\n    first = second = float('-inf')\n    for score in scores:\n        if score > first:\n            second = first\n            first = score\n        elif score > second and score != first:\n            second = score\n    return second\n\nprint(second_highest([45, 82, 91, 67, 91, 73]))",
  pythonOutput:"82",
  hints:[
    "You can't just find the max and remove it (that modifies the list). Instead, track TWO values as you scan. What two things do you need to remember?",
    "Maintain 'first' (highest) and 'second' (second highest). When you find a new highest, the old highest becomes the second highest. What about duplicates?",
    "Key logic: IF score > first → second becomes old first, first becomes score. ELSE IF score > second AND score ≠ first → second becomes score. The second condition handles duplicates.",
    "💡 Prompt Reveal:\n\n\"Write pseudocode to find the second-highest value in a list without sorting. Track two variables: first and second, both initialized to negative infinity. On each element: if > first, cascade (second=first, first=element). Else if > second AND ≠ first, update second. Handle duplicate highest values.\"\n\nThe cascade logic is the key insight."
  ],
  successMsg:"Excellent! The cascade pattern (when a new champion arrives, the old champion moves to second place) is elegant. And handling duplicates with the != check is crucial for correctness.",
  partialMsg:"You're tracking two values - good. But check: (1) When you update 'first', do you save the old value into 'second'? (2) Do you handle the case where the highest value appears multiple times?"
},
{
  id:"A4",type:"Pseudocode Writing",difficulty:"Hard",title:"Merge Two Sorted Lists",icon:"✏️",
  setup:"Task: Given two ALREADY SORTED lists, merge them into a single sorted list. Do not simply concatenate and re-sort.\n\nExample:\n  List A: [1, 4, 7, 10]\n  List B: [2, 3, 8, 11, 15]\n  Output: [1, 2, 3, 4, 7, 8, 10, 11, 15]\n\nWrite pseudocode that takes advantage of the fact that both inputs are already sorted. Think about how you'd merge two sorted stacks of papers by hand.\n\nHint on efficiency: you should only need to pass through each list once.",
  context:"Classic merge algorithm (used in merge sort). Tests pointer/index management, while-loop with dual conditions, and handling remaining elements.",
  expectedKeywords:[
    ["pointer","index","position","cursor","i","j","track"],
    ["compare","smaller","less","check","which"],
    ["append","add","push","insert","put","result","merged"],
    ["while","both","not empty","still","remaining","left"],
    ["move","advance","increment","next","forward"],
    ["remaining","leftover","rest","append rest","copy rest"],
    ["result","output","merged","new list"]
  ],
  minMatches:5,
  sampleAnswer:"SET i = 0, j = 0\nSET result = empty list\nWHILE i < LENGTH(A) AND j < LENGTH(B):\n    IF A[i] <= B[j] THEN\n        APPEND A[i] to result\n        SET i = i + 1\n    ELSE\n        APPEND B[j] to result\n        SET j = j + 1\nAPPEND remaining elements of A (from i onward) to result\nAPPEND remaining elements of B (from j onward) to result\nRETURN result",
  pythonCode:"def merge_sorted(a, b):\n    i = j = 0\n    result = []\n    while i < len(a) and j < len(b):\n        if a[i] <= b[j]:\n            result.append(a[i])\n            i += 1\n        else:\n            result.append(b[j])\n            j += 1\n    result.extend(a[i:])\n    result.extend(b[j:])\n    return result\n\nprint(merge_sorted([1,4,7,10], [2,3,8,11,15]))",
  pythonOutput:"[1, 2, 3, 4, 7, 8, 10, 11, 15]",
  hints:[
    "Imagine two sorted piles of numbered cards face-up. To merge: compare the top cards, take the smaller one, place it in your output pile. Repeat. What do you do when one pile runs out?",
    "You need two pointers (one per list) and a result list. The main loop runs while BOTH lists still have elements. Each iteration: compare, take smaller, advance that pointer.",
    "Three phases: (1) While both have elements → compare and take smaller, (2) When one runs out → dump the rest of the other into result. The 'dump remaining' step is often forgotten.",
    "💡 Prompt Reveal:\n\n\"Write pseudocode for merging two sorted lists. Use two index pointers (i, j). Main while loop: while both indices valid, compare elements, append smaller, advance its pointer. After loop: append remaining from whichever list isn't exhausted.\"\n\nExplicitly calling out the 'remaining elements' phase prevents the most common bug."
  ],
  successMsg:"That's the merge algorithm - the heart of merge sort! O(n+m) time, single pass through each list. This same technique works for merging sorted files, database results, and event streams.",
  partialMsg:"Good structure. Common gaps: (1) Are you comparing elements from BOTH lists before deciding which to take? (2) After the main loop, one list may still have elements - are you appending them?"
},

// ── TYPE B: LOOP SELECTION ──────────────────────────────────
{
  id:"B1",type:"Loop Selection",difficulty:"Easy",title:"Print Multiplication Table",icon:"🔁",
  setup:"Task: Print the multiplication table for a given number (e.g., 7) from 1 to 10.\n\nExpected output:\n7 x 1 = 7\n7 x 2 = 14\n...\n7 x 10 = 70\n\nWhich loop type is best here?\n\n  A) for loop\n  B) while loop\n  C) do-while loop\n  D) nested for loop\n\nState your choice AND explain WHY it's the best fit for this task.",
  context:"Classic for-loop scenario: known iteration count (1 to 10), simple increment.",
  expectedKeywords:[
    ["for","for loop"],
    ["known","fixed","exact","definite","10","specific","count"],
    ["1 to 10","range","sequence","counter"],
    ["increment","step","increase","i++","next"]
  ],
  minMatches:3,
  sampleAnswer:"A) for loop\n\nWhy: The iteration count is known in advance (exactly 10 times, from 1 to 10). A for loop is designed for situations where you know the start, end, and step before the loop begins. There's no condition to check dynamically - you simply count from 1 to 10.\n\nfor i = 1 to 10:\n    print(number × i = result)",
  hints:[
    "Ask yourself: do you know EXACTLY how many times this loop will run before it starts? If yes, that points to a specific loop type.",
    "For loop = known count. While loop = unknown count, keep going until a condition changes. Which applies here?",
    "Multiplication tables always go 1-10. That's 10 iterations, decided before the loop starts. No dynamic stopping condition needed.",
    "💡 Prompt Reveal:\n\n\"Given a task with a predetermined iteration count (1 to 10), select the appropriate loop type and justify. Consider: for (known count), while (condition-based), do-while (at least once), nested (multi-dimensional).\"\n\nThe decision tree: Known count → for. Unknown stop → while. At least once → do-while. Grid/matrix → nested."
  ],
  successMsg:"Correct! For loop = known iteration count. This is the most fundamental loop selection rule: if you can answer 'how many times?' before the loop starts, use a for loop.",
  partialMsg:"You picked the right loop but your explanation could be sharper. The key reason is: the iteration count (10) is KNOWN before the loop begins. That's the defining trait of a for-loop use case."
},
{
  id:"B2",type:"Loop Selection",difficulty:"Medium-Easy",title:"User Input Validation",icon:"🔁",
  setup:"Task: Keep asking a user to enter a valid password until they provide one that meets the criteria (at least 8 characters, contains a number).\n\nThe program should:\n1. Prompt for password\n2. Check if valid\n3. If invalid, show error and ask again\n4. If valid, accept and move on\n\nWhich loop type is best?\n\n  A) for loop\n  B) while loop\n  C) do-while loop\n  D) nested for loop\n\nState your choice AND explain WHY.",
  context:"do-while (or while with initial prompt) scenario: must execute at least once, unknown number of iterations, condition checked after each attempt.",
  expectedKeywords:[
    ["while","do while","do-while","repeat until"],
    ["unknown","don't know","can't predict","indefinite","variable"],
    ["at least once","must ask","need to ask first","execute first","always run once"],
    ["condition","check","valid","criteria","until"],
    ["user","input","response","depends on"]
  ],
  minMatches:3,
  sampleAnswer:"C) do-while loop (or while loop with initialization)\n\nWhy: (1) You must ask for the password AT LEAST ONCE - you can't check validity without getting input first. (2) You don't know how many attempts the user will need - it could be 1 or 100. (3) The loop condition depends on the user's input, which is obtained INSIDE the loop.\n\ndo:\n    password = GET_INPUT(\"Enter password:\")\n    valid = check_criteria(password)\n    if NOT valid: PRINT(\"Invalid. Try again.\")\nwhile NOT valid\n\nA while loop also works if you initialize: valid = false, then while NOT valid: ask, check.",
  hints:[
    "Two questions: (1) Do you know how many attempts it will take? (2) Must the loop body run at least once before you can check the condition?",

const $m=document.getElementById("messages"),

function addBot(text,style,buttons,extras){
  const row=document.createElement("div");row.className="msg-row bot";
  const bub=document.createElement("div");
  bub.className="bubble bot"+(style?" "+style:"");
  bub.textContent=text;
  row.appendChild(bub);

  if(extras){
    extras.forEach(ex=>{
      const block=document.createElement("div");

      block.innerHTML=ex.html||"";

      row.appendChild(block);

    const g=document.createElement("div");g.className="btn-group";
    buttons.forEach(l=>{
      const b=document.createElement("button");b.className="btn-pill";b.textContent=l;
      b.onclick=()=>handleBtn(l);g.appendChild(b);

    row.appendChild(g);
  }
  $m.appendChild(row);scroll();
}

function addTraceTable(table){
  const row=document.createElement("div");row.className="msg-row bot";
  const bub=document.createElement("div");bub.className="bubble bot answer";
  bub.style.padding="12px";bub.style.maxWidth="95%";

  bub.innerHTML=html;
  row.appendChild(bub);$m.appendChild(row);scroll();

function escHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

// EVALUATOR
// ═════════════════════════════════════════════════════════════
function evaluate(text,ch){
  const lo=text.toLowerCase();
  let matched=0;
  ch.expectedKeywords.forEach(g=>{if(g.some(k=>lo.includes(k.toLowerCase())))matched++});
  if(matched>=ch.minMatches)return"correct";
  if(matched/ch.expectedKeywords.length>=0.3)return"partial";
  return"incorrect";
}

function getAdaptive(){
  const h=S.hintsHist;if(h.length<2)return null;
  const avg=h.slice(-2).reduce((a,b)=>a+b,0)/2;
  if(avg<=1)return{s:"adaptive boost",t:"🔥 You're crushing it! Ramping up the difficulty."};
  if(avg>=3)return{s:"adaptive support",t:"💪 No shortcuts to mastery. Take your time on this one."};
  return null;
}

  h+=`</div></div><div class="card"><div class="card-label">Hints Available</div><div class="hint-dots">`;
  for(let i=1;i<=4;i++)h+=`<div class="hint-dot ${i<=S.hintsUsed?'used':'unused'}">${i}</div>`;

}

}

function toggleReference(){
  if(S.panelMode==="ref"){S.panelMode=null;$rp.classList.remove("open");document.getElementById("btnRef").textContent="📋 Demo Reference"}
  else{S.panelMode="ref";$rp.classList.add("open");renderRef();document.getElementById("btnRef").textContent="Hide Reference"}
}
function togglePanel(){
  if(S.panelMode==="ctx"){S.panelMode=null;$rp.classList.remove("open")}
  else{S.panelMode="ctx";$rp.classList.add("open");renderCtx(S.currentCh)}
}
function showCtx(ch){S.currentCh=ch;if(S.panelMode==="ctx")renderCtx(ch)}

// ═════════════════════════════════════════════════════════════
// CHALLENGE FLOW
// ═════════════════════════════════════════════════════════════
function present(){
  const ch=S.queue[S.idx];S.hintsUsed=0;showCtx(ch);
  const am=getAdaptive();if(am)addBot(am.t,am.s);
  addBot(`── ${ch.icon} ${ch.type} | Challenge ${ch.id} | ${ch.difficulty} ──\n\n${ch.title}`,"header");
  setTimeout(()=>{addBot(ch.setup);S.phase="challenge";enableInput(true)},300);
}

function advance(){
  S.idx++;
  if(S.idx>=S.queue.length){
    S.phase="allDone";showCtx(null);
    const c=S.scores.filter(x=>x.result==="correct").length;
    const th=S.scores.reduce((a,x)=>a+x.hints,0);
    const v=c>=10?"Outstanding! You've mastered algorithmic thinking.":c>=7?"Strong showing! Review challenges where you needed 3+ hints.":"Good effort. Revisit the hint explanations for the key patterns.";
    addBot(`🏁 All challenges complete!\n\nScore: ${c}/${S.scores.length} first-attempt successes\nTotal hints used: ${th}\n\n${v}`,"summary");
    setTimeout(()=>{
      addBot("Want to go again or try a different type?",null,["✏️ Pseudocode Writing","🔁 Loop Selection","🔬 Trace & Predict","▶️ All (sequential)"]);
      S.phase="selectType";enableInput(false);
    },600);
    return;
  }
  present();
}

function showSuccess(ch){
  addBot("✅ "+ch.successMsg,"success");
  // Show Python conversion for Type A
  if(ch.pythonCode){
    setTimeout(()=>addPythonResult(ch.pythonCode,ch.pythonOutput),400);
  }
  // Show trace table for Type C
  if(ch.traceTable){
    setTimeout(()=>addTraceTable(ch.traceTable),400);
  }
  S.scores.push({id:ch.id,result:"correct",hints:S.hintsUsed});
  S.hintsHist.push(S.hintsUsed);updateProg();
  setTimeout(()=>{
    addBot("Moving on.",null,["▶️ Next Challenge","📋 Show Model Answer"]);
    S.phase="hint";enableInput(false);
  },ch.pythonCode||ch.traceTable?800:300);
}

function showHinted(ch){
  addBot(`Here's the model answer:\n\n${ch.sampleAnswer}`,"answer");
  if(ch.pythonCode)setTimeout(()=>addPythonResult(ch.pythonCode,ch.pythonOutput),400);
  if(ch.traceTable)setTimeout(()=>addTraceTable(ch.traceTable),400);
  setTimeout(()=>{
    S.scores.push({id:ch.id,result:"hinted",hints:4});
    S.hintsHist.push(4);updateProg();
    addBot("Study this, then move on.",null,["▶️ Next Challenge"]);
    S.phase="hint";enableInput(false);
  },ch.pythonCode||ch.traceTable?800:400);
}

// ═════════════════════════════════════════════════════════════
// INPUT HANDLERS
// ═════════════════════════════════════════════════════════════
function handleBtn(label){
  addUser(label);
  if(S.phase==="selectType"){
    let q;
    if(label.includes("Pseudocode"))q=CH.filter(c=>c.type==="Pseudocode Writing");
    else if(label.includes("Loop"))q=CH.filter(c=>c.type==="Loop Selection");
    else if(label.includes("Trace"))q=CH.filter(c=>c.type==="Trace & Predict");
    else q=[...CH];
    S.queue=q;S.idx=0;S.scores=[];S.hintsHist=[];updateProg();
    present();return;
  }
  if(label==="💡 Get a Hint"){
    const ch=S.queue[S.idx],hi=S.hintsUsed;
    if(hi<4){
      addBot(`Hint ${hi+1}/4:\n\n${ch.hints[hi]}`,"hint");
      S.hintsUsed=hi+1;showCtx(ch);
      if(hi+1===4)setTimeout(()=>showHinted(ch),300);
    }
    return;
  }
  if(label==="▶️ Next Challenge"){advance();return}
  if(label==="📋 Show Model Answer"){
    const ch=S.queue[S.idx];
    addBot(`Model answer:\n\n${ch.sampleAnswer}`,"answer");
    if(ch.pythonCode)setTimeout(()=>addPythonResult(ch.pythonCode,ch.pythonOutput),400);
    if(ch.traceTable)setTimeout(()=>addTraceTable(ch.traceTable),400);
    return;
  }
}

function handleSubmit(){
  const t=$i.value.trim();if(!t||S.phase!=="challenge")return;
  $i.value="";$i.style.height="auto";addUser(t);
  const ch=S.queue[S.idx],r=evaluate(t,ch);
  setTimeout(()=>{
    if(r==="correct"){showSuccess(ch)}
    else if(r==="partial"){
      addBot("🔶 "+ch.partialMsg,"partial");
      setTimeout(()=>addBot("Expand your answer or grab a hint.",null,["💡 Get a Hint"]),200);
    } else {
      addBot("Not quite. Let's work through it.","incorrect");
      setTimeout(()=>addBot("Try again or get a hint.",null,["💡 Get a Hint"]),200);
    }
  },400);
}

// INIT

(function(){
  addBot("Welcome to the Algorithms & Pseudocode Practice Lab! ⚡");
  setTimeout(()=>{
    addBot("12 challenges across three skill types:\n\n✏️ Pseudocode Writing (4) - Write pseudocode, see it converted to Python\n🔁 Loop Selection (4) - Pick the right loop and justify your choice\n🔬 Trace & Predict (4) - Step through an algorithm and predict output\n\nDifficulty increases within each type. I'll adapt based on your performance.");
    setTimeout(()=>{
      addBot("For Pseudocode challenges, I'll convert your answer to Python and show the execution result. For Trace challenges, you'll get a detailed trace table.\n\nReady? Pick a type or do all sequentially.",null,
        ["✏️ Pseudocode Writing","🔁 Loop Selection","🔬 Trace & Predict","▶️ All (sequential)"]);
      S.phase="selectType";
    },300);
  },200);
})();
